  2. **Procedural Due Process**: This requires that individuals receive fair procedures before the government can deprive them of their rights. The complaint raises concerns about the fairness of the investigatory conduct and arrest procedures. If Barber was denied a fair opportunity to contest the basis for his arrest or if the arrest lacked adequate legal justification (i.e., probable cause), then his procedural due process rights may have been violated.

